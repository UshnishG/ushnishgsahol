name: Auto Commit

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make commit
        run: |
          echo "$(date -u)" >> log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add log.txt
          git commit -m "auto commit $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
